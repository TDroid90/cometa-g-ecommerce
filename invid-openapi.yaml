openapi: 3.0.3
info:
  title: APIv1 Invid
  version: "1.0.0"
  description: |
    Documentacion de la API de Productos de Invid
    La APIv1 permite autenticar usuarios y consultar articulos del catalogo.
    Cada endpoint devuelve respuestas en formato JSON.
    La autenticacion se realiza mediante tokens JWT.

    Notas operativas:
    - El token JWT tiene una duracion documentada de 24 horas.
    - `GET /api/v1/articulo.php` tiene un limite de 200 requests por hora por usuario autenticado.
    - El endpoint de articulos devuelve una unica imagen principal en `IMAGE_URL`.
    - El listado de articulos no filtra por defecto productos con precio `0` ni productos sin stock. Cada integrador debe decidir si los consume como catalogo general o si los excluye para escenarios de compra inmediata.
servers:
  - url: /
    description: Invid
tags:
  - name: Auth
    description: Autenticacion y emision de tokens JWT.
  - name: Articulos
    description: Consulta de articulos; cada pagina devuelve hasta 100 resultados.
paths:
  /api/v1/auth.php:
    post:
      tags:
        - Auth
      summary: Generar un token JWT
      description:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            examples:
              login:
                summary: Ejemplo de login
                value:
                  username: api-user
                  password: secret
      responses:
        '201':
          description: Credenciales validas; se crea el token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
              example:
                status: 1
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.demo.signature
                token_type: Bearer
                expiration_time: 86400
                username: api-user
        '401':
          description: Credenciales invalidas o faltantes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 0
                message: Incorrect credentials.
        '405':
          description: Metodo no permitido (solo POST / OPTIONS habilitados).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error inesperado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Modulo API deshabilitado en el sistema.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/articulo.php:
    get:
      tags:
        - Articulos
      summary: Listar o recuperar articulos
      description: >
        Devuelve hasta 100 articulos por pagina segun la lista de precios y permisos asociados al token.
        Si se envia `id` se devuelve ese articulo puntual; de lo contrario se entrega la primera pagina
        del catalogo (100 items) y un `next_page_url` cuando hay mas datos.
        Requiere JWT en el header `Authorization: Bearer <token>`.

        Consideraciones de integracion:
        - Este endpoint no aplica filtrado automatico de articulos sin stock ni de articulos con precio `0`.
        - `IMAGE_URL` corresponde a la imagen principal del articulo.
        - `CATEGORIES` expone todas las categorias visibles asignadas al articulo, incluyendo la categoria padre cuando exista.
        - Este endpoint tiene un limite de 200 requests por hora por usuario autenticado.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Resultado exitoso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticuloResponse'
              examples:
                listado:
                  summary: Pagina de resultados
                  value:
                    status: 1
                    data:
                      - ID: "ART-001"
                        TITLE: Notebook 14
                        PRICE: "150000.00"
                        CURRENCY: ARS
                        PART_NUMBER: NB-14-2024
                        BRAND: Marca
                        DESCRIPTION: Equipo porttil 14 pulgadas.
                        LONG_DESCRIPTION: Notebook con pantalla de 14 pulgadas y batera de larga duracin.
                        STOCK_STATUS: Disponible
                        IMAGE_URL: https://example.com/images/ART-001.jpg
                        CATEGORY_ID: "10"
                        CATEGORY: Notebooks
                        CATEGORIES:
                          - ID: "10"
                            NAME: Notebooks
                            IS_PRIMARY: true
                            PARENT:
                              ID: "1"
                              NAME: Informatica
                        TAGS:
                          destacado:
                            - Nuevo
                        HEIGHT: 2.1
                        WIDTH: 33.0
                        LENGTH: 24.0
                        VOLUME: 1660.8
                        WEIGHT: 1.4
                        DIMENSIONS_UNIT: Cm
                        WEIGHT_UNIT: Kg
                    next_page_url: https://example.com/api/v1/articulo?offset=100
                detalle:
                  summary: Consulta por ID
                  value:
                    status: 1
                    data:
                      ID: "ART-002"
                      TITLE: Monitor 24
                      PRICE: "120000.00"
                      CURRENCY: ARS
                      PART_NUMBER: MN-24-2024
                      BRAND: Marca
                      DESCRIPTION: Monitor 24 pulgadas.
                      LONG_DESCRIPTION: Monitor de 24 pulgadas con panel IPS y resolucin Full HD.
                      STOCK_STATUS: Consultar
                      STOCK: 8
                      IMAGE_URL: https://example.com/images/ART-002.jpg
                      CATEGORY_ID: "12"
                      CATEGORY: Monitores
                      CATEGORIES:
                        - ID: "12"
                          NAME: Monitores
                          IS_PRIMARY: true
                          PARENT:
                            ID: "3"
                            NAME: Perifericos
                      TAGS: {}
                      HEIGHT: 45.0
                      WIDTH: 55.0
                      LENGTH: 18.0
                      VOLUME: 44550
                      WEIGHT: 4.2
                      DIMENSIONS_UNIT: Cm
                      WEIGHT_UNIT: Kg
        '400':
          description: Parametros invalidos (por ejemplo, `offset` sin resultados) o articulo inexistente cuando se pide pagina distinta a la inicial.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token faltante, invalido o usuario sin rol habilitado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No se encontro el articulo solicitado (cuando se usa `id`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Metodo no permitido (solo GET / OPTIONS habilitados).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Se excedio el rate limit del usuario autenticado para el endpoint de articulos.
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Cuota maxima de requests en la ventana activa.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Requests restantes en la ventana activa.
            X-RateLimit-Reset:
              schema:
                type: integer
              description: Timestamp Unix en el que reinicia la ventana actual.
            Retry-After:
              schema:
                type: integer
              description: Segundos a esperar antes de reintentar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 0
                message: Rate limit exceeded for GET /api/v1/articulo.php
        '500':
          description: Error interno inesperado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Modulo API deshabilitado en el sistema.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: query
      description: Codigo de articulo. Si se envia, se ignora `offset` y se devuelve solo ese articulo.
      required: false
      schema:
        type: string
    Offset:
      name: offset
      in: query
      description: Desplazamiento para el listado paginado. El tamano de pagina es 100; el valor siguiente se obtiene de `next_page_url`.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Nombre de usuario.
        password:
          type: string
          format: password
          description: Contrasena.
    AuthSuccess:
      type: object
      required:
        - status
        - access_token
        - token_type
        - expiration_time
        - username
      properties:
        status:
          type: integer
          enum: [1]
        access_token:
          type: string
          description: Token JWT.
        token_type:
          type: string
          example: Bearer
        expiration_time:
          type: integer
          description: "Tiempo de expiracion en segundos. Valor documentado actual: 86400 (24 horas)."
        username:
          type: string
    ErrorResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: integer
          enum: [0]
        message:
          type: string
    ArticuloResponse:
      type: object
      required:
        - status
        - data
      properties:
        status:
          type: integer
          enum: [1]
        data:
          description: Objeto unico cuando se envia `id`, o lista de articulos cuando es un listado.
          oneOf:
            - $ref: '#/components/schemas/Articulo'
            - type: array
              items:
                $ref: '#/components/schemas/Articulo'
        next_page_url:
          type: string
          nullable: true
          description: URL de la siguiente pagina cuando hay 100 o mas resultados en la respuesta.
    Articulo:
      type: object
      properties:
        ID:
          type: string
          description: Codigo interno de articulo (`cArtCod`).
        TITLE:
          type: string
          description: Descripcion corta del articulo.
        PRICE:
          type: string
          description: Precio calculado para la lista del usuario (puede venir formateado segun la configuracion numerica).
        CURRENCY:
          type: string
          description: Simbolo de moneda de la lista aplicada.
        PART_NUMBER:
          type: string
          nullable: true
          description: Referencia del fabricante (`cArtDesPac`).
        BRAND:
          type: string
          nullable: true
        DESCRIPTION:
          type: string
          nullable: true
          description: Descripcion limpia en texto plano.
        LONG_DESCRIPTION:
          type: string
          nullable: true
          description: Descripcion larga en texto plano.
        STOCK_STATUS:
          type: string
          description: Estado de stock calculado con los semaforos configurados (verde/amarillo/rojo).
        STOCK:
          type: number
          nullable: true
          description: Valor numerico de stock. Solo se incluye cuando el usuario tiene permiso para verlo.
        IVA_PERCENT:
          type: number
          format: float
        IVA_VALUE:
          type: string
          description: IVA calculado y formateado.
        INTERNAL_TAX_PERCENT:
          type: number
          format: float
        INTERNAL_TAX_VALUE:
          type: string
          description: Impuesto interno calculado y formateado.
        FINAL_PRICE:
          type: string
          description: Precio final formateado (precio + impuestos).
        IMAGE_URL:
          type: string
          format: uri
          nullable: true
          description: URL de la imagen principal del articulo. La galeria secundaria del producto no se expone actualmente en esta API.
        CATEGORY:
          type: string
          nullable: true
          description: Nombre de la categoria principal (si existe) o secundaria.
        CATEGORY_ID:
          type: string
          nullable: true
          description: Codigo de la categoria principal (si existe) o secundaria.
        CATEGORIES:
          type: array
          description: Todas las categorias visibles asignadas al articulo, incluyendo el indicador de principal y su categoria padre cuando exista.
          items:
            $ref: '#/components/schemas/ArticuloCategory'
        TAGS:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Etiquetas agrupadas por grupo de etiquetas.
        HEIGHT:
          type: number
          format: float
          nullable: true
        WIDTH:
          type: number
          format: float
          nullable: true
        LENGTH:
          type: number
          format: float
          nullable: true
        VOLUME:
          type: number
          format: float
          nullable: true
        WEIGHT:
          type: number
          format: float
          nullable: true
        DIMENSIONS_UNIT:
          type: string
          nullable: true
          description: Unidad de medida de alto/ancho/largo (por defecto `Cm`).
        WEIGHT_UNIT:
          type: string
          nullable: true
          description: Unidad de peso (ej. `Kg` o el simbolo configurado en `peso_unidades`).
    ArticuloCategory:
      type: object
      properties:
        ID:
          type: string
          description: Codigo de la categoria asignada.
        NAME:
          type: string
          description: Nombre de la categoria asignada.
        IS_PRIMARY:
          type: boolean
          description: Indica si la categoria esta marcada como principal para el articulo.
        PARENT:
          $ref: '#/components/schemas/ArticuloCategoryParent'
          nullable: true
    ArticuloCategoryParent:
      type: object
      properties:
        ID:
          type: string
          description: Codigo de la categoria padre.
        NAME:
          type: string
          description: Nombre de la categoria padre.

